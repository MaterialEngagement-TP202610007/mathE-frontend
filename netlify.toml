[build]
  command   = "pnpm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

# API proxy — forwards /api/* to Render backend keeping everything same-origin.
# Must be declared BEFORE the SPA catch-all below.
# This bypasses cross-site cookie restrictions (SameSite) entirely.
[[redirects]]
  from   = "/api/*"
  to     = "https://mathe-backend-1cqc.onrender.com/api/:splat"
  status = 200
  force  = true

# SPA fallback — send every path to index.html so react-router handles routing
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Cache static assets aggressively (Vite hashes filenames)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# No-cache for the entry point so the browser always fetches the latest shell
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
